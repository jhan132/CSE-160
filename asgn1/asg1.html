<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Assignment 1 - Painting</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 12px;
      min-height: 100vh;
    }
    h1 { font-size: 1.3rem; color: #a0c4ff; letter-spacing: 2px; }
    #webgl {
      border: 2px solid #a0c4ff;
      cursor: crosshair;
      display: block;
    }
    .controls {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 12px 16px;
      width: 400px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    label { font-size: 0.78rem; color: #a0c4ff; min-width: 90px; }
    button {
      background: #0f3460;
      color: #e0e0ff;
      border: 1px solid #a0c4ff;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.78rem;
      transition: background 0.15s;
    }
    button:hover, button.active { background: #533483; }
    input[type=range] { width: 110px; accent-color: #a0c4ff; }
    .val { font-size: 0.72rem; color: #ccc; min-width: 28px; }
    .note {
      font-size: 0.7rem;
      color: #888;
      background: #0d1b2a;
      padding: 6px 10px;
      border-radius: 4px;
      border-left: 2px solid #a0c4ff;
      width: 400px;
    }
  </style>
</head>
<body onload="main()">
  <h1>CSE-160 · Assignment 1: Painting</h1>

  <canvas id="webgl" width="400" height="400"></canvas>

  <div class="controls">
    <div class="row">
      <button id="btnClear">Clear Canvas</button>
      <button id="btnPicture">Draw My Picture (JH)</button>
    </div>
    <div class="row">
      <label>Drawing Mode:</label>
      <button id="btnPoint" class="active">Points</button>
      <button id="btnTriangle">Triangles</button>
      <button id="btnCircle">Circles</button>
    </div>
    <div class="row">
      <label>Shape Color:</label>
      <span style="font-size:0.72rem;color:#f88">R</span>
      <input type="range" id="rSlider" min="0" max="255" value="255">
      <span style="font-size:0.72rem;color:#8f8">G</span>
      <input type="range" id="gSlider" min="0" max="255" value="128">
      <span style="font-size:0.72rem;color:#88f">B</span>
      <input type="range" id="bSlider" min="0" max="255" value="200">
    </div>
    <div class="row">
      <label>Shape Size:</label>
      <input type="range" id="sizeSlider" min="1" max="80" value="10">
      <span class="val" id="sizeVal">10</span>
      <label style="min-width:130px">Circle Segments:</label>
      <input type="range" id="segSlider" min="3" max="64" value="12">
      <span class="val" id="segVal">12</span>
    </div>
  </div>

  <div class="note">
    ✦ Click or drag to paint · My picture uses triangles to spell "JH" as initials
  </div>

  <script src="lib/cuon-matrix-cse160.js"></script>
  <script src="asg1.js"></script>
</body>
</html>
